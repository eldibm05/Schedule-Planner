<script type="text/babel" data-presets="react">
const {useState, useEffect, useCallback, useRef} = React;

// ── Palette ───────────────────────────────────────────────────────────────────
const C = {
  bg:"#080808", bg2:"#0a0a14", bg3:"#0d0d1e",
  blue:"#4466cc", blueD:"#2233aa",
  red:"#cc3322", yellow:"#ffcc00", orange:"#ff6600",
  green:"#33aa44", white:"#ddddcc",
  dim:"#444455", dimmer:"#1a1a2e", borderDim:"#1a1a3a",
};
const UL = ["","LOW","NORMAL","HIGH","URGENT","CRITICAL"];
const UC = ["",C.dim,C.blue,C.green,C.orange,C.red];
const FREQS = ["daily","weekdays","weekly"];
const HOUR_H = 72, CAL_S = 9, CAL_E = 21;
const HOURS = Array.from({length:CAL_E-CAL_S},(_,i)=>CAL_S+i);
const PX = {fontFamily:"'Press Start 2P',monospace"};

// ── Audio ─────────────────────────────────────────────────────────────────────
function playBeep(type="notify") {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const seqs = {
      notify:[[523,.1],[659,.1],[784,.15]],
      done:[[784,.08],[784,.08],[1047,.2]],
      warn:[[440,.15],[349,.15]],
    };
    let t = ctx.currentTime;
    (seqs[type]||seqs.notify).forEach(([f,d]) => {
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type="square"; o.frequency.value=f;
      g.gain.setValueAtTime(.14,t);
      g.gain.exponentialRampToValueAtTime(.001,t+d);
      o.start(t); o.stop(t+d); t+=d+.02;
    });
  } catch(e) {}
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2,9);
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = d => { if(!d)return""; const[y,m,dy]=d.split("-"); return`${m}/${dy}/${y}`; };
const dayName = d => ["SUN","MON","TUE","WED","THU","FRI","SAT"][new Date(d+"T12:00:00").getDay()];
const addDays = (d,n) => { const dt=new Date(d+"T12:00:00"); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); };
const weekDates = anchor => {
  const dt=new Date(anchor+"T12:00:00");
  const dow=dt.getDay();
  const mon=new Date(dt);
  mon.setDate(dt.getDate()-(dow===0?6:dow-1));
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d.toISOString().slice(0,10); });
};
const minToTime = m => { const h=Math.floor(m/60),mn=m%60,ap=h>=12?"PM":"AM",h12=h%12||12; return`${h12}:${mn.toString().padStart(2,"0")}${ap}`; };
const t24Min = t => { if(!t)return 0; const[h,m]=(t+"").split(":").map(Number); return h*60+(m||0); };

// ── Default data ──────────────────────────────────────────────────────────────
const defaultState = () => ({
  projects:[{id:uid(),name:"Sample Project",color:C.red,dueDate:"",tasks:[
    {id:uid(),title:"Write report",duration:60,urgency:4,difficulty:3,dueDate:addDays(today(),3),recurring:false,freq:"daily",done:false},
    {id:uid(),title:"Research phase",duration:90,urgency:3,difficulty:4,dueDate:addDays(today(),5),recurring:false,freq:"daily",done:false},
  ]}],
  standaloneTasks:[
    {id:uid(),title:"Morning workout",duration:45,urgency:2,difficulty:2,dueDate:"",recurring:true,freq:"daily",done:false},
  ],
  events:[], schedule:[], completionLog:{},
  settings:{workStart:9*60,workEnd:21*60,maxHrsDefault:6,dayOverrides:{}},
  weekAnchor:today(),
});

function loadState(){try{const s=localStorage.getItem("arcadePlannerV1");return s?JSON.parse(s):defaultState();}catch{return defaultState();}}
function saveState(s){try{localStorage.setItem("arcadePlannerV1",JSON.stringify(s));}catch{}}

// ── Scheduler ─────────────────────────────────────────────────────────────────
function findFreeSlot(day,dur,evtBlocks,existing,settings){
  const blocks=[...evtBlocks,...existing.filter(s=>s.date===day).map(s=>({start:s.startMin,end:s.startMin+s.duration}))].sort((a,b)=>a.start-b.start);
  let cur=settings.workStart;
  for(const b of blocks){if(cur+dur<=b.start)return cur; cur=Math.max(cur,b.end);}
  return cur+dur<=settings.workEnd?cur:null;
}

function autoSchedule(state){
  const{projects,standaloneTasks,events,settings,weekAnchor}=state;
  const days=weekDates(weekAnchor);
  const allTasks=[...standaloneTasks,...projects.flatMap(p=>p.tasks)];
  const evtBlocks={};
  days.forEach(d=>{evtBlocks[d]=[];});
  events.forEach(e=>{if(evtBlocks[e.date]!==undefined)evtBlocks[e.date].push({start:t24Min(e.startTime),end:t24Min(e.startTime)+e.duration});});
  const td=today();
  const scored=allTasks.filter(t=>!t.done&&!t.recurring).map(t=>{
    const du=t.dueDate?Math.max(0,(new Date(t.dueDate)-new Date(td))/86400000):99;
    return{...t,score:(t.urgency*2)+Math.max(0,10-du)-(t.difficulty*.5)};
  }).sort((a,b)=>b.score-a.score);
  const used={};days.forEach(d=>{used[d]=0;});
  const sched=[];
  for(const task of scored){
    for(const day of days){
      if(new Date(day+"T12:00:00")<new Date(td+"T12:00:00"))continue;
      const max=(settings.dayOverrides[day]??settings.maxHrsDefault)*60;
      if(used[day]+task.duration>max)continue;
      const slot=findFreeSlot(day,task.duration,evtBlocks[day],sched,settings);
      if(slot!==null){sched.push({id:uid(),taskId:task.id,date:day,startMin:slot,duration:task.duration,done:false,type:"task"});used[day]+=task.duration;break;}
    }
  }
  for(const task of allTasks.filter(t=>t.recurring)){
    for(const day of days){
      const dow=new Date(day+"T12:00:00").getDay();
      if(task.freq==="weekdays"&&(dow===0||dow===6))continue;
      if(task.freq==="weekly"&&dow!==1)continue;
      const max=(settings.dayOverrides[day]??settings.maxHrsDefault)*60;
      if(used[day]+task.duration>max)continue;
      const slot=findFreeSlot(day,task.duration,evtBlocks[day],sched,settings);
      if(slot!==null){sched.push({id:uid(),taskId:task.id,date:day,startMin:slot,duration:task.duration,done:false,type:"recurring"});used[day]+=task.duration;}
    }
  }
  return sched;
}

// ── Shared UI ─────────────────────────────────────────────────────────────────
const Btn=({onClick,bg=C.blue,tc=C.yellow,children,sx={}})=>(
  <button onClick={onClick} style={{...PX,background:bg,border:"none",color:tc,fontSize:10,padding:"7px 10px",cursor:"pointer",...sx}}>{children}</button>
);
const Lbl=({t,children})=>(
  <div style={{marginBottom:11}}>
    <div style={{...PX,fontSize:9,color:C.dim,marginBottom:4}}>{t}</div>
    {children}
  </div>
);
const inp = {background:C.bg2,color:C.white,border:`2px solid ${C.blue}`,padding:"5px 7px",fontSize:10,width:"100%",outline:"none",...PX};
const Inp = (props) => <input {...props} style={{...inp,...(props.style||{})}}/>;
const Sel = ({value,onChange,opts}) => (
  <select value={value} onChange={onChange} style={{...inp}}>
    {opts.map(o=><option key={o} value={o}>{o.toUpperCase()}</option>)}
  </select>
);

function Modal({title,onClose,children}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:12}}>
      <div style={{background:C.bg2,border:`3px solid ${C.blue}`,maxWidth:440,width:"100%",maxHeight:"88vh",overflowY:"auto"}}>
        <div style={{background:C.red,padding:"6px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{...PX,fontSize:11,color:C.yellow}}>{title}</span>
          <button onClick={onClose} style={{...PX,background:"none",border:"none",color:C.yellow,fontSize:16,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{padding:14}}>{children}</div>
      </div>
    </div>
  );
}

// ── Task Form ─────────────────────────────────────────────────────────────────
function TaskForm({init={},onSave,onClose}){
  const[f,setF]=useState({title:"",duration:30,urgency:2,difficulty:2,dueDate:"",recurring:false,freq:"daily",...init});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return(
    <div>
      <Lbl t="TITLE"><Inp value={f.title} onChange={e=>s("title",e.target.value)} placeholder="Task name..."/></Lbl>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Lbl t="DURATION (MIN)"><Inp type="number" value={f.duration} onChange={e=>s("duration",+e.target.value)} min={5} step={5}/></Lbl>
        <Lbl t="DUE DATE"><Inp type="date" value={f.dueDate} onChange={e=>s("dueDate",e.target.value)}/></Lbl>
        <Lbl t={`URGENCY: ${UL[f.urgency]}`}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <input type="range" min={1} max={5} value={f.urgency} onChange={e=>s("urgency",+e.target.value)} style={{flex:1,accentColor:UC[f.urgency]}}/>
            <span style={{...PX,fontSize:10,color:UC[f.urgency],minWidth:10}}>{f.urgency}</span>
          </div>
        </Lbl>
        <Lbl t={`DIFFICULTY: ${f.difficulty}/5`}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <input type="range" min={1} max={5} value={f.difficulty} onChange={e=>s("difficulty",+e.target.value)} style={{flex:1}}/>
            <span style={{...PX,fontSize:10,color:C.white,minWidth:10}}>{f.difficulty}</span>
          </div>
        </Lbl>
      </div>
      <Lbl t="RECURRING">
        <label style={{...PX,display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:10,color:f.recurring?C.yellow:C.dim}}>
          <input type="checkbox" checked={f.recurring} onChange={e=>s("recurring",e.target.checked)} style={{width:"auto",accentColor:C.yellow}}/>
          RECURRING TASK
        </label>
      </Lbl>
      {f.recurring&&<Lbl t="FREQUENCY"><Sel value={f.freq} onChange={e=>s("freq",e.target.value)} opts={FREQS}/></Lbl>}
      <div style={{display:"flex",gap:8,marginTop:12}}>
        <Btn onClick={()=>{if(f.title){onSave(f);playBeep("done");}}} bg={C.green}>SAVE</Btn>

}

// ── Projects Tab ──────────────────────────────────────────────────────────────
function ProjectsTab({state,setState}){
  const[modal,setModal]=useState(null);

  const saveTask=(pid,task,editId)=>{
    setState(prev=>{
      const s=JSON.parse(JSON.stringify(prev));
      if(pid){
        const p=s.projects.find(p=>p.id===pid);
        if(editId){const i=p.tasks.findIndex(t=>t.id===editId);p.tasks[i]={...p.tasks[i],...task};}
        else p.tasks.push({id:uid(),done:false,...task});
      } else {
        if(editId){const i=s.standaloneTasks.findIndex(t=>t.id===editId);s.standaloneTasks[i]={...s.standaloneTasks[i],...task};}
        else s.standaloneTasks.push({id:uid(),done:false,...task});
      }
      s.schedule=autoSchedule(s); return s;
    }); setModal(null);
  };

  const delTask=(pid,tid)=>setState(prev=>{
    const s=JSON.parse(JSON.stringify(prev));
    if(pid){const p=s.projects.find(p=>p.id===pid);p.tasks=p.tasks.filter(t=>t.id!==tid);}
    else s.standaloneTasks=s.standaloneTasks.filter(t=>t.id!==tid);
    s.schedule=autoSchedule(s); return s;
  });

  const saveProj=(proj,editId)=>{
    setState(prev=>{
      const s=JSON.parse(JSON.stringify(prev));
      if(editId){const i=s.projects.findIndex(p=>p.id===editId);s.projects[i]={...s.projects[i],...proj};}
      else s.projects.push({id:uid(),tasks:[],...proj});
      return s;
    }); setModal(null);
  };

  const delProj=pid=>setState(prev=>{
    const s=JSON.parse(JSON.stringify(prev));
    s.projects=s.projects.filter(p=>p.id!==pid);
    s.schedule=autoSchedule(s); return s;
  });

  const pct=proj=>proj.tasks.length?Math.round(proj.tasks.filter(t=>t.done).length/proj.tasks.length*100):0;

  const TRow=({task,pid})=>{
    const col=UC[task.urgency];
    return(
      <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 8px",borderLeft:`3px solid ${col}`,background:C.bg3,marginBottom:2}}>
        <div style={{flex:1}}>
          <div style={{...PX,fontSize:10,color:task.done?C.dim:C.white,textDecoration:task.done?"line-through":"none"}}>{task.title}</div>
          <div style={{...PX,fontSize:8,color:C.dim,marginTop:4,display:"flex",gap:8,flexWrap:"wrap"}}>
            <span style={{color:col}}>{UL[task.urgency]}</span>
            <span>{task.duration}MIN</span>
            {task.dueDate&&<span>DUE {fmtDate(task.dueDate)}</span>}
            {task.recurring&&<span style={{color:C.orange}}>↻ {task.freq.toUpperCase()}</span>}
          </div>
        </div>
        <Btn onClick={()=>setModal({type:"editTask",pid,task})} bg={C.blueD} tc={C.white} sx={{fontSize:8,padding:"3px 6px"}}>EDIT</Btn>
        <Btn onClick={()=>delTask(pid,task.id)} bg={C.red} tc={C.yellow} sx={{fontSize:8,padding:"3px 6px"}}>DEL</Btn>
      </div>
    );
  };

  return(
    <div style={{padding:14,overflowY:"auto",height:"100%"}}>
      <div style={{marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{...PX,fontSize:11,color:C.yellow}}>▸ STANDALONE TASKS</span>
          <Btn onClick={()=>setModal({type:"addTask",pid:null})} bg={C.blue} sx={{fontSize:9,padding:"5px 9px"}}>+ ADD TASK</Btn>
        </div>
        {state.standaloneTasks.length===0&&<div style={{...PX,fontSize:9,color:C.dim,padding:"8px 0"}}>NO TASKS YET. PRESS + ADD TASK TO START.</div>}
        {state.standaloneTasks.map(t=><TRow key={t.id} task={t} pid={null}/>)}
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{...PX,fontSize:11,color:C.yellow}}>▸ PROJECTS</span>
        <Btn onClick={()=>setModal({type:"addProject"})} bg={C.red} tc={C.yellow} sx={{fontSize:9,padding:"5px 9px"}}>+ NEW PROJECT</Btn>
      </div>

      {state.projects.map(proj=>{
        const p=pct(proj);
        return(
          <div key={proj.id} style={{marginBottom:16,border:`2px solid ${proj.color}22`,background:C.bg2}}>
            <div style={{background:proj.color,padding:"6px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <span style={{...PX,fontSize:11,color:C.yellow}}>{proj.name}</span>
                {proj.dueDate&&<span style={{...PX,fontSize:8,color:`${C.yellow}cc`,marginLeft:10}}>DUE {fmtDate(proj.dueDate)}</span>}
              </div>
              <div style={{display:"flex",gap:5,alignItems:"center"}}>
                <span style={{...PX,fontSize:9,color:C.yellow}}>{p}%</span>
                <Btn onClick={()=>setModal({type:"editProject",proj})} bg="rgba(0,0,0,.35)" tc={C.yellow} sx={{fontSize:8,padding:"2px 6px"}}>EDIT</Btn>
                <Btn onClick={()=>delProj(proj.id)} bg="rgba(0,0,0,.35)" tc={C.yellow} sx={{fontSize:8,padding:"2px 6px"}}>DEL</Btn>
              </div>
            </div>
            <div style={{height:4,background:C.dimmer}}><div style={{height:"100%",width:`${p}%`,background:C.green,transition:"width .3s"}}/></div>
            <div style={{padding:8}}>
              {proj.tasks.map(t=><TRow key={t.id} task={t} pid={proj.id}/>)}
              <Btn onClick={()=>setModal({type:"addTask",pid:proj.id})} bg={C.bg3} tc={C.blue} sx={{fontSize:8,padding:"5px 9px",marginTop:6,border:`1px solid ${C.blue}`}}>+ ADD TASK</Btn>
            </div>
          </div>
        );
      })}

      <div style={{marginTop:20,textAlign:"center"}}>
        <Btn onClick={()=>{setState(prev=>({...prev,schedule:autoSchedule(prev)}));playBeep("notify");}} bg={C.orange} tc={C.bg} sx={{fontSize:11,padding:"10px 22px"}}>⚡ AUTO-SCHEDULE WEEK</Btn>
      </div>

      {modal?.type==="addTask"&&<Modal title="+ NEW TASK" onClose={()=>setModal(null)}><TaskForm onSave={t=>saveTask(modal.pid,t,null)} onClose={()=>setModal(null)}/></Modal>}
      {modal?.type==="editTask"&&<Modal title="EDIT TASK" onClose={()=>setModal(null)}><TaskForm init={modal.task} onSave={t=>saveTask(modal.pid,t,modal.task.id)} onClose={()=>setModal(null)}/></Modal>}
      {modal?.type==="addProject"&&<Modal title="+ NEW PROJECT" onClose={()=>setModal(null)}><ProjectForm onSave={p=>saveProj(p,null)} onClose={()=>setModal(null)}/></Modal>}
      {modal?.type==="editProject"&&<Modal title="EDIT PROJECT" onClose={()=>setModal(null)}><ProjectForm init={modal.proj} onSave={p=>saveProj(p,modal.proj.id)} onClose={()=>setModal(null)}/></Modal>}
    </div>
  );
}

// ── Calendar Tab ──────────────────────────────────────────────────────────────
function CalendarTab({state,setState}){
  const[modal,setModal]=useState(null);
  const[capEdit,setCapEdit]=useState(null);
  const td=today();
  const taskMap={};
  state.standaloneTasks.forEach(t=>{taskMap[t.id]=t;});
  state.projects.forEach(p=>p.tasks.forEach(t=>{taskMap[t.id]=t;}));

  const checkPerfect=(s,day)=>{
    const all=[...s.events.filter(e=>e.date===day),...s.schedule.filter(x=>x.date===day)];
    const perfect=all.length>0&&all.every(i=>i.done);
    s.completionLog[day]={...(s.completionLog[day]||{}),perfect};
    if(perfect)playBeep("notify");
  };

  const toggle=(type,id,day)=>{
    setState(prev=>{
      const s=JSON.parse(JSON.stringify(prev));
      if(type==="event"){const e=s.events.find(e=>e.id===id);if(e)e.done=!e.done;}
      else{
        const sc=s.schedule.find(x=>x.id===id);
        if(sc){
          sc.done=!sc.done;
          if(!taskMap[sc.taskId]?.recurring){
            s.standaloneTasks=s.standaloneTasks.map(t=>t.id===sc.taskId?{...t,done:sc.done}:t);
            s.projects=s.projects.map(p=>({...p,tasks:p.tasks.map(t=>t.id===sc.taskId?{...t,done:sc.done}:t)}));
          }
        }
      }
      checkPerfect(s,day); return s;
    }); playBeep("done");
  };

  const saveEvt=(data,editId)=>{
    setState(prev=>{
      const s=JSON.parse(JSON.stringify(prev));
      const e={id:editId||uid(),...data,done:false};
      if(editId)s.events=s.events.map(x=>x.id===editId?e:x);
      else s.events.push(e);
      s.schedule=autoSchedule(s); return s;
    }); setModal(null);
  };

  const delEvt=id=>{
    setState(prev=>{const s=JSON.parse(JSON.stringify(prev));s.events=s.events.filter(e=>e.id!==id);s.schedule=autoSchedule(s);return s;});
    setModal(null);
  };

  const setDayCap=(day,hrs)=>{
    setState(prev=>{const s=JSON.parse(JSON.stringify(prev));if(!hrs)delete s.settings.dayOverrides[day];else s.settings.dayOverrides[day]=hrs;s.schedule=autoSchedule(s);return s;});
    setCapEdit(null);
  };

  const streak=(()=>{let c=0,ch=addDays(td,-1);while(state.completionLog[ch]?.perfect){c++;ch=addDays(ch,-1);}if(state.completionLog[td]?.perfect)c++;return c;})();

  // Schedule browser notifications for today
  useEffect(()=>{
    if(!("Notification"in window))return;
    if(Notification.permission==="default")Notification.requestPermission();
    const timers=[];
    const nowMs=Date.now();
    const items=[
      ...state.events.filter(e=>e.date===td&&!e.done).map(e=>({name:e.title,startMin:t24Min(e.startTime),dur:e.duration})),
      ...state.schedule.filter(s=>s.date===td&&!s.done).map(s=>({name:taskMap[s.taskId]?.title||"Task",startMin:s.startMin,dur:s.duration})),
    ].sort((a,b)=>a.startMin-b.startMin);
    items.forEach((item,i)=>{
      const base=new Date(td+"T00:00:00").getTime();
      const st=base+item.startMin*60000, wt=st-300000, nxt=items[i+1];
      if(wt>nowMs)timers.push(setTimeout(()=>{
        playBeep("warn");
        if(Notification.permission==="granted")new Notification("⏰ 5 MIN WARNING",{body:"Starting soon: "+item.name,icon:""});
      },wt-nowMs));
      if(st>nowMs)timers.push(setTimeout(()=>{
        playBeep("notify");
        if(Notification.permission==="granted")new Notification("▶ NOW: "+item.name,{body:item.dur+"min"+(nxt?" | NEXT: "+nxt.name:""),icon:""});
      },st-nowMs));
    });
    return()=>timers.forEach(clearTimeout);
  },[state.schedule,state.events]);

  const minToY=m=>((m-CAL_S*60)/60)*HOUR_H;

  const DayCol=({day})=>{
    const evts=state.events.filter(e=>e.date===day);
    const sched=state.schedule.filter(s=>s.date===day);
    return(
      <div style={{flex:1,minWidth:0,borderLeft:`1px solid ${C.borderDim}`,position:"relative"}}>
        {HOURS.map(h=><div key={h} style={{position:"absolute",top:(h-CAL_S)*HOUR_H,left:0,right:0,height:HOUR_H,borderBottom:`1px solid ${C.dimmer}`}}/>)}
        {evts.map(evt=>{
          const top=minToY(t24Min(evt.startTime));
          const ht=Math.max(24,(evt.duration/60)*HOUR_H);
          return(
            <div key={evt.id} style={{position:"absolute",top,left:2,right:2,height:ht,background:`${C.yellow}18`,borderLeft:`3px solid ${C.yellow}`,overflow:"hidden",zIndex:2,cursor:"pointer"}} onClick={()=>setModal({type:"editEvt",evt})}>
              <div style={{display:"flex",gap:3,padding:"3px 4px",alignItems:"flex-start"}}>
                <div onClick={e=>{e.stopPropagation();toggle("event",evt.id,day);}} style={{width:11,height:11,border:`1px solid ${C.yellow}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:evt.done?C.bg:C.yellow,background:evt.done?C.yellow:"transparent",cursor:"pointer",flexShrink:0,marginTop:1}}>
                  {evt.done?"✓":""}
                </div>
                <div>
                  <div style={{...PX,fontSize:8,color:C.yellow,lineHeight:1.6,textDecoration:evt.done?"line-through":"none"}}>{evt.title}</div>
                  <div style={{...PX,fontSize:7,color:`${C.yellow}88`}}>{evt.startTime} · {evt.duration}m</div>
                </div>
              </div>
            </div>
          );
        })}
        {sched.map(sc=>{
          const task=taskMap[sc.taskId]; if(!task)return null;
          const col=UC[task.urgency];
          const top=minToY(sc.startMin);
          const ht=Math.max(24,(sc.duration/60)*HOUR_H);
          return(
            <div key={sc.id} style={{position:"absolute",top,left:2,right:2,height:ht,background:`${col}18`,borderLeft:`3px solid ${col}`,overflow:"hidden",zIndex:1}}>
              <div style={{display:"flex",gap:3,padding:"3px 4px",alignItems:"flex-start"}}>
                <div onClick={()=>toggle("scheduled",sc.id,day)} style={{width:11,height:11,border:`1px solid ${col}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:sc.done?C.bg:col,background:sc.done?col:"transparent",cursor:"pointer",flexShrink:0,marginTop:1}}>
                  {sc.done?"✓":""}
                </div>
                <div>
                  <div style={{...PX,fontSize:8,color:col,lineHeight:1.6,textDecoration:sc.done?"line-through":"none"}}>{task.title}{task.recurring?" ↻":""}</div>
                  <div style={{...PX,fontSize:7,color:`${col}88`}}>{minToTime(sc.startMin)} · {sc.duration}m</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    );
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      {/* Week navigation */}
      <div style={{padding:"7px 14px",borderBottom:`2px solid ${C.blue}`,background:C.bg2,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <Btn onClick={()=>setState(p=>({...p,weekAnchor:addDays(p.weekAnchor,-7)}))} bg={C.blueD} sx={{fontSize:13,padding:"5px 10px"}}>◀</Btn>
        <div style={{textAlign:"center"}}>
          <div style={{...PX,fontSize:9,color:C.yellow}}>{fmtDate(weekDates(state.weekAnchor)[0])} – {fmtDate(weekDates(state.weekAnchor)[6])}</div>
          <div style={{...PX,fontSize:13,color:C.orange,marginTop:3}}>🔥 {streak} DAY STREAK</div>
        </div>
        <Btn onClick={()=>setState(p=>({...p,weekAnchor:addDays(p.weekAnchor,7)}))} bg={C.blueD} sx={{fontSize:13,padding:"5px 10px"}}>▶</Btn>
      </div>

      {/* Toolbar */}
      <div style={{padding:"5px 12px",borderBottom:`1px solid ${C.borderDim}`,background:C.bg2,flexShrink:0,display:"flex",gap:8,justifyContent:"flex-end"}}>
        <Btn onClick={()=>setModal({type:"addEvt"})} bg={C.yellow} tc={C.bg} sx={{fontSize:9,padding:"5px 9px"}}>+ APPOINTMENT</Btn>
        <Btn onClick={()=>{setState(prev=>({...prev,schedule:autoSchedule(prev)}));playBeep("notify");}} bg={C.orange} tc={C.bg} sx={{fontSize:9,padding:"5px 9px"}}>⚡ RESCHEDULE</Btn>
      </div>

      {/* Day headers */}
      <div style={{display:"flex",flexShrink:0,borderBottom:`1px solid ${C.borderDim}`}}>
        <div style={{width:44,flexShrink:0}}/>
        {weekDates(state.weekAnchor).map(day=>{
          const isToday=day===td;
          const cap=state.settings.dayOverrides[day]??state.settings.maxHrsDefault;
          const perfect=state.completionLog[day]?.perfect;
          return(
            <div key={day} style={{flex:1,textAlign:"center",padding:"4px 1px",background:isToday?C.yellow:C.bg2,borderLeft:`1px solid ${C.borderDim}`}}>
              <div style={{...PX,fontSize:8,color:isToday?C.bg:C.blue}}>{dayName(day)}</div>
              <div style={{...PX,fontSize:11,color:isToday?C.bg:C.white}}>{day.slice(8)}</div>
              {perfect&&<div style={{...PX,fontSize:8,color:isToday?C.bg:C.orange}}>★ PERFECT</div>}
              {capEdit===day
                ?<input type="number" defaultValue={cap} min={1} max={16} step={.5} autoFocus
                    style={{...PX,width:"100%",fontSize:9,padding:"2px",background:C.bg,color:C.white,border:`1px solid ${C.orange}`}}
                    onBlur={e=>setDayCap(day,+e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter")setDayCap(day,+e.target.value);if(e.key==="Escape")setCapEdit(null);}}/>
                :<div style={{...PX,fontSize:7,color:isToday?`${C.bg}aa`:C.dim,cursor:"pointer",marginTop:2}} onClick={()=>setCapEdit(day)}>
                    {cap}h cap{state.settings.dayOverrides[day]?" ✎":""}
                  </div>
              }
            </div>
          );
        })}
      </div>

      {/* Scrollable grid */}
      <div style={{flex:1,overflowY:"auto"}}>
        <div style={{display:"flex",height:HOURS.length*HOUR_H}}>
          <div style={{width:44,flexShrink:0,position:"relative"}}>
            {HOURS.map(h=>(
              <div key={h} style={{...PX,position:"absolute",top:(h-CAL_S)*HOUR_H-8,right:4,fontSize:8,color:C.dim,textAlign:"right"}}>
                {h>12?`${h-12}PM`:h===12?"12PM":`${h}AM`}
              </div>
            ))}
          </div>
          {weekDates(state.weekAnchor).map(day=><DayCol key={day} day={day}/>)}
        </div>
      </div>

      {modal?.type==="addEvt"&&<Modal title="+ ADD APPOINTMENT" onClose={()=>setModal(null)}><EventForm onSave={d=>saveEvt(d,null)} onClose={()=>setModal(null)}/></Modal>}
      {modal?.type==="editEvt"&&(
        <Modal title="EDIT APPOINTMENT" onClose={()=>setModal(null)}>
          <EventForm init={modal.evt} onSave={d=>saveEvt(d,modal.evt.id)} onClose={()=>setModal(null)}/>
          <div style={{marginTop:10}}><Btn onClick={()=>delEvt(modal.evt.id)} bg={C.red} tc={C.yellow} sx={{fontSize:9}}>DELETE APPOINTMENT</Btn></div>
        </Modal>
      )}
    </div>
  );
}

// ── Analytics Tab ─────────────────────────────────────────────────────────────
function AnalyticsTab({state}){
  const allTasks=[...state.standaloneTasks,...state.projects.flatMap(p=>p.tasks)];
  const weeks=Array.from({length:4},(_,i)=>{
    const days=weekDates(addDays(today(),-i*7));
    const total=state.schedule.filter(s=>days.includes(s.date)).length+state.events.filter(e=>days.includes(e.date)).length;
    const done=state.schedule.filter(s=>days.includes(s.date)&&s.done).length+state.events.filter(e=>days.includes(e.date)&&e.done).length;
    return{label:i===0?"THIS WK":`-${i}W`,total,done,pct:total?Math.round(done/total*100):0};
  }).reverse();
  const last14=Array.from({length:14},(_,i)=>addDays(today(),-13+i));
  let streak=0,ch=addDays(today(),-1);
  while(state.completionLog[ch]?.perfect){streak++;ch=addDays(ch,-1);}
  if(state.completionLog[today()]?.perfect)streak++;
  const perf14=last14.filter(d=>state.completionLog[d]?.perfect).length;
  const openByU=[1,2,3,4,5].map(u=>({u,count:allTasks.filter(t=>!t.done&&t.urgency===u).length}));
  const maxU=Math.max(...openByU.map(x=>x.count),1);

  return(
    <div style={{padding:16,overflowY:"auto",height:"100%"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}>
        <div style={{background:C.bg2,border:`2px solid ${C.orange}`,padding:14,textAlign:"center"}}>
          <div style={{...PX,fontSize:9,color:C.dim,marginBottom:6}}>CURRENT STREAK</div>
          <div style={{...PX,fontSize:70,color:C.orange}}>{streak}</div>
          <div style={{...PX,fontSize:9,color:C.dim,marginTop:4}}>PERFECT DAYS</div>
        </div>
        <div style={{background:C.bg2,border:`2px solid ${C.yellow}`,padding:14}}>
          <div style={{...PX,fontSize:9,color:C.dim,marginBottom:8}}>LAST 14 DAYS</div>
          <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
            {last14.map(d=><div key={d} title={d} style={{width:15,height:15,background:state.completionLog[d]?.perfect?C.orange:C.dimmer,border:`1px solid ${C.dim}`}}/>)}
          </div>
          <div style={{...PX,fontSize:8,color:C.dim,marginTop:6}}>{perf14} / 14 PERFECT</div>
        </div>
      </div>

      <div style={{marginBottom:18}}>
        <div style={{...PX,fontSize:10,color:C.yellow,marginBottom:10}}>▸ WEEKLY COMPLETION</div>
        {weeks.map(w=>(
          <div key={w.label} style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",...PX,fontSize:8,color:C.dim,marginBottom:3}}>
              <span>{w.label}</span><span>{w.done}/{w.total} · {w.pct}%</span>
            </div>
            <div style={{height:14,background:C.dimmer,position:"relative"}}>
              <div style={{height:"100%",width:`${w.pct}%`,background:w.pct>=80?C.green:w.pct>=50?C.blue:C.red,transition:"width .4s"}}/>
              <div style={{...PX,position:"absolute",right:4,top:2,fontSize:8,color:C.white}}>{w.pct}%</div>
            </div>
          </div>
        ))}
      </div>

      {state.projects.length>0&&(
        <div style={{marginBottom:18}}>
          <div style={{...PX,fontSize:10,color:C.yellow,marginBottom:10}}>▸ PROJECT PROGRESS</div>
          {state.projects.map(p=>{
            const done=p.tasks.filter(t=>t.done).length;
            const pct=p.tasks.length?Math.round(done/p.tasks.length*100):0;
            return(
              <div key={p.id} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",...PX,fontSize:8,marginBottom:3}}>
                  <span style={{color:p.color}}>{p.name}</span><span style={{color:C.dim}}>{done}/{p.tasks.length}</span>
                </div>
                <div style={{height:14,background:C.dimmer}}><div style={{height:"100%",width:`${pct}%`,background:p.color,transition:"width .4s"}}/></div>
              </div>
            );
          })}
        </div>
      )}

      <div style={{marginBottom:18}}>
        <div style={{...PX,fontSize:10,color:C.yellow,marginBottom:10}}>▸ OPEN TASKS BY URGENCY</div>
        <div style={{display:"flex",gap:5,alignItems:"flex-end",height:90}}>
          {openByU.map(({u,count})=>(
            <div key={u} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{...PX,fontSize:9,color:UC[u]}}>{count}</div>
              <div style={{width:"100%",height:(count/maxU)*72,background:UC[u],minHeight:count?4:0}}/>
              <div style={{...PX,fontSize:7,color:C.dim}}>{UL[u].slice(0,3)}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
        {[
          {label:"TOTAL TASKS",val:allTasks.length,col:C.blue},
          {label:"COMPLETED",val:allTasks.filter(t=>t.done).length,col:C.green},
          {label:"OVERDUE",val:allTasks.filter(t=>!t.done&&t.dueDate&&t.dueDate<today()).length,col:C.red},
        ].map(s=>(
          <div key={s.label} style={{background:C.bg2,border:`2px solid ${s.col}`,padding:10,textAlign:"center"}}>
            <div style={{...PX,fontSize:8,color:C.dim,marginBottom:6}}>{s.label}</div>
            <div style={{...PX,fontSize:28,color:s.col}}>{s.val}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Now/Next bar ──────────────────────────────────────────────────────────────
function NowBar({state}){
  const[,tick]=useState(0);
  useEffect(()=>{const id=setInterval(()=>tick(t=>t+1),30000);return()=>clearInterval(id);},[]);
  const taskMap={};
  state.standaloneTasks.forEach(t=>{taskMap[t.id]=t;});
  state.projects.forEach(p=>p.tasks.forEach(t=>{taskMap[t.id]=t;}));
  const nowMin=new Date().getHours()*60+new Date().getMinutes();
  const td=today();
  const items=[
    ...state.events.filter(e=>e.date===td&&!e.done).map(e=>({name:e.title,start:t24Min(e.startTime),dur:e.duration})),
    ...state.schedule.filter(s=>s.date===td&&!s.done).map(s=>({name:taskMap[s.taskId]?.title||"Task",start:s.startMin,dur:s.duration})),
  ].sort((a,b)=>a.start-b.start);
  const cur=items.find(i=>i.start<=nowMin&&nowMin<i.start+i.dur);
  const nxt=items.find(i=>i.start>nowMin);
  if(!cur&&!nxt)return null;
  return(
    <div style={{background:"#090400",borderBottom:`2px solid ${C.orange}`,padding:"6px 14px",...PX,fontSize:9,color:C.orange,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
      <span style={{animation:"blink .8s step-end infinite"}}>▶</span>
      {cur?<>NOW: <span style={{color:C.yellow,marginLeft:5}}>{cur.name}</span></>:<span style={{color:C.dim}}>IDLE</span>}
      {nxt&&<><span style={{color:C.dim,margin:"0 8px"}}>|</span><span style={{color:C.dim}}>NEXT {minToTime(nxt.start)}:</span><span style={{color:C.white,marginLeft:5}}>{nxt.name}</span></>}
    </div>
  );
}

// ── Settings ──────────────────────────────────────────────────────────────────
function Settings({settings,onSave,onClose}){
  const[f,setF]=useState({sh:Math.floor(settings.workStart/60),eh:Math.floor(settings.workEnd/60),max:settings.maxHrsDefault});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return(
    <Modal title="⚙ SETTINGS" onClose={onClose}>
      <Lbl t="WORK START HOUR (0-23)"><Inp type="number" value={f.sh} min={0} max={23} onChange={e=>s("sh",+e.target.value)}/></Lbl>
      <Lbl t="WORK END HOUR (1-24)"><Inp type="number" value={f.eh} min={1} max={24} onChange={e=>s("eh",+e.target.value)}/></Lbl>
      <Lbl t="DEFAULT MAX HRS/DAY"><Inp type="number" value={f.max} min={1} max={16} step={.5} onChange={e=>s("max",+e.target.value)}/></Lbl>
      <div style={{...PX,fontSize:9,color:C.dim,marginBottom:14,lineHeight:2.2}}>
        TIP: CLICK ANY DAY HEADER IN CALENDAR TO OVERRIDE THAT DAY'S CAP
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn onClick={()=>{onSave({workStart:f.sh*60,workEnd:f.eh*60,maxHrsDefault:f.max});playBeep("done");}} bg={C.green}>SAVE</Btn>
        <Btn onClick={onClose} bg={C.dim} tc={C.white}>CANCEL</Btn>
      </div>
    </Modal>
  );
}

// Change this to whatever password you want:
const PASSWORD = "arcade123";
const AUTH_KEY = "arcadePlannerAuth";

function LoginScreen({onUnlock}){
  const[pw,setPw]=useState("");
  const[err,setErr]=useState(false);
  const[shake,setShake]=useState(false);

  const attempt=()=>{
    if(pw===PASSWORD){
      localStorage.setItem(AUTH_KEY,"1");
      onUnlock();
    } else {
      setErr(true);
      setShake(true);
      setPw("");
      playBeep("warn");
      setTimeout(()=>setShake(false),500);
    }
  };

  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,gap:24}}>
      <div style={{...PX,fontSize:18,color:C.red,letterSpacing:6,textAlign:"center"}}>ARCADE</div>
      <div style={{...PX,fontSize:10,color:C.yellow,letterSpacing:3,marginTop:-18}}>PLANNER v1.0</div>
      <div style={{border:`3px solid ${C.blue}`,background:C.bg2,padding:"28px 32px",maxWidth:320,width:"90%",animation:shake?"shake .4s ease":"none"}}>
        <div style={{...PX,fontSize:10,color:C.yellow,marginBottom:18,textAlign:"center"}}>▸ ENTER PASSWORD</div>
        <Inp
          type="password"
          value={pw}
          onChange={e=>{setPw(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==="Enter"&&attempt()}
          placeholder="password..."
          autoFocus
          style={{marginBottom:14}}
        />
        {err&&<div style={{...PX,fontSize:9,color:C.red,marginBottom:12,textAlign:"center"}}>WRONG PASSWORD</div>}
        <Btn onClick={attempt} bg={C.red} tc={C.yellow} sx={{width:"100%",padding:"10px",fontSize:11}}>UNLOCK</Btn>
      </div>
      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}`}</style>
    </div>
  );
}

    if(!authed)return;
    if(!state.schedule.length)setState(prev=>({...prev,schedule:autoSchedule(prev)}));

              {t}

          <button onClick={()=>{localStorage.removeItem(AUTH_KEY);setAuthed(false);}} style={{...PX,background:"none",border:`2px solid ${C.dim}`,color:C.dim,fontSize:11,padding:"5px 9px",cursor:"pointer"}}>🔒</button>
        </div>
      </div>

      <NowBar state={state}/>

      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {tab==="PROJECTS"&&<ProjectsTab state={state} setState={setState}/>}
        {tab==="CALENDAR"&&<CalendarTab state={state} setState={setState}/>}
        {tab==="ANALYTICS"&&<AnalyticsTab state={state}/>}
      </div>


      {showSettings&&(
        <Settings settings={state.settings}
          onSave={s=>{setState(prev=>{const next={...prev,settings:{...prev.settings,...s}};next.schedule=autoSchedule(next);return next;});setShowSettings(false);}}
          onClose={()=>setShowSettings(false)}/>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
